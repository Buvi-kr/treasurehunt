<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TREASURE HUNTER PRO</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --primary: #00ff88;
            --accent: #bc13fe;
            --bg: #0a0a0c;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text: #e0e0e0;
        }

        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            overflow: hidden; /* 스크롤 방지 */
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 메인 컨테이너 */
        #app-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 1;
        }

        h1 {
            font-size: 1.5rem;
            letter-spacing: 4px;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
        }

        /* 상태 박스 */
        .status-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 30px 20px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            margin-bottom: 40px;
        }

        #found-count {
            font-size: 4rem;
            font-weight: 800;
            margin: 10px 0;
            font-variant-numeric: tabular-nums;
        }

        .progress-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 20px;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            transition: all 0.3s;
        }

        .dot.active {
            background: var(--primary);
            box-shadow: 0 0 10px var(--primary);
        }

        #message {
            font-size: 0.95rem;
            line-height: 1.5;
            color: #aaa;
            min-height: 3em;
        }

        /* 스캔 버튼 */
        .btn-main {
            background: linear-gradient(45deg, var(--primary), #00d4ff);
            color: #000;
            border: none;
            padding: 18px 40px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0, 255, 136, 0.3);
            transition: 0.3s;
        }

        .btn-main:active { transform: scale(0.95); }

        /* 스캐너 오버레이 (핵심 변경사항) */
        #scanner-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 100;
        }

        #reader {
            width: 100%;
            height: 100%;
        }

        /* 스캔 화면 가이드 UI */
        .scan-guide {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 250px; height: 250px;
            border: 2px solid var(--primary);
            border-radius: 30px;
            box-shadow: 0 0 0 4000px rgba(0,0,0,0.6);
            z-index: 110;
            pointer-events: none;
        }

        .scan-guide::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: var(--primary);
            box-shadow: 0 0 15px var(--primary);
            animation: scanMove 2s infinite linear;
        }

        @keyframes scanMove {
            0% { top: 0%; }
            50% { top: 100%; }
            100% { top: 0%; }
        }

        .btn-close-scan {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 30px;
            z-index: 120;
            backdrop-filter: blur(5px);
        }

        /* 유틸리티 */
        .utils { position: fixed; bottom: 20px; display: flex; gap: 10px; opacity: 0.5; }
        .btn-util { background: none; border: 1px solid #444; color: #888; padding: 5px 10px; border-radius: 5px; font-size: 11px; }

        .success-text { color: var(--primary) !important; font-weight: bold; }
    </style>
</head>
<body>

    <div id="app-container">
        <h1>TREASURE RADAR</h1>

        <div class="status-card">
            <div class="progress-dots" id="dots-container">
                </div>
            <p style="margin: 0; color: #888; font-size: 12px; letter-spacing: 1px;">COLLECTED BOXES</p>
            <div id="found-count">0 / 7</div>
            <div id="message">주변의 QR 보안 코드를 스캔하여<br>숨겨진 보물을 찾으세요.</div>
        </div>

        <button class="btn-main" id="start-btn" onclick="openScanner()">📷 탐지 스캐너 가동</button>

        <div class="utils">
            <button class="btn-util" onclick="resetGame()">RESET</button>
            <button class="btn-util" onclick="exportData()">BACKUP</button>
        </div>
    </div>

    <div id="scanner-overlay">
        <div id="reader"></div>
        <div class="scan-guide"></div>
        <button class="btn-close-scan" onclick="closeScanner()">닫기</button>
    </div>

    <script>
        const TOTAL_BOXES = 7;
        const GUARANTEE_COUNT = 5;
        const LOW_PROBABILITY = 0.01;

        let scanner = null;
        let isProcessing = false;
        let isScannerInitialized = false;

        window.onload = () => {
            initDots();
            updateUI();
        };

        function initDots() {
            const container = document.getElementById('dots-container');
            for(let i=0; i<TOTAL_BOXES; i++) {
                const dot = document.createElement('div');
                dot.className = 'dot';
                container.appendChild(dot);
            }
        }

        // 스캐너 열기 (최초 1회만 권한 요청 및 시작)
        async function openScanner() {
            document.getElementById('scanner-overlay').style.display = 'block';
            
            if (!isScannerInitialized) {
                scanner = new Html5Qrcode("reader");
                const config = { fps: 20, qrbox: { width: 250, height: 250 } };
                
                try {
                    await scanner.start({ facingMode: "environment" }, config, onScanSuccess);
                    isScannerInitialized = true;
                } catch (err) {
                    alert("카메라 권한이 필요합니다.");
                    closeScanner();
                }
            } else {
                // 이미 초기화된 경우 비디오를 다시 그리기 시작 (라이브러리 내부적 처리)
                // 만약 라이브러리가 멈춰있다면 resume()을 호출할 수 있으나 
                // 여기서는 레이어 제어만으로도 충분히 빠릅니다.
            }
        }

        function closeScanner() {
            document.getElementById('scanner-overlay').style.display = 'none';
        }

        function onScanSuccess(decodedText) {
            if (isProcessing) return;
            isProcessing = true;

            // 스캔 성공 시 즉시 레이어 닫기 (피드백 속도 향상)
            closeScanner();
            
            // 진동 피드백
            if(navigator.vibrate) navigator.vibrate(100);

            handleGameLogic(decodedText);

            setTimeout(() => { isProcessing = false; }, 2000);
        }

        function handleGameLogic(code) {
            let foundBoxes = JSON.parse(localStorage.getItem('found_boxes') || '[]');
            const msgEl = document.getElementById('message');

            if (!code.startsWith('BOX_')) {
                msgEl.innerText = "❌ 잘못된 코드입니다.";
                return;
            }

            if (foundBoxes.includes(code)) {
                msgEl.innerText = "⚠️ 이미 탐지된 상자입니다.";
                return;
            }

            foundBoxes.push(code);
            localStorage.setItem('found_boxes', JSON.stringify(foundBoxes));
            
            const currentCount = foundBoxes.length;
            const isWin = (currentCount >= GUARANTEE_COUNT) || (Math.random() < LOW_PROBABILITY);

            if (isWin) {
                localStorage.setItem('game_cleared', 'true');
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                msgEl.innerHTML = "<span class='success-text'>🎊 최종 보물 발견! 상품을 수령하세요! 🎊</span>";
            } else {
                msgEl.innerText = `[${code.replace('BOX_','')}번 상자] 비어있습니다. (${currentCount}/${TOTAL_BOXES})`;
            }

            updateUI();
        }

        function updateUI() {
            const foundBoxes = JSON.parse(localStorage.getItem('found_boxes') || '[]');
            const count = foundBoxes.length;
            
            document.getElementById('found-count').innerText = `${count} / ${TOTAL_BOXES}`;
            
            // 점 업데이트
            const dots = document.querySelectorAll('.dot');
            dots.forEach((dot, idx) => {
                if (idx < count) dot.classList.add('active');
            });

            if (localStorage.getItem('game_cleared') === 'true') {
                document.getElementById('start-btn').style.display = 'none';
                document.getElementById('found-count').style.color = 'var(--primary)';
            }
        }

        function resetGame() {
            if(confirm("모든 기록을 초기화할까요?")) {
                localStorage.clear();
                location.reload();
            }
        }

        function exportData() {
            const data = localStorage.getItem('found_boxes');
            if(data) alert("복구 코드: " + btoa(data));
            else alert("기록이 없습니다.");
        }
    </script>
</body>
</html>
