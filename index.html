<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>과학관 탐사 프로젝트: 넥서스</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

        :root {
            --cyan: #00f3ff;
            --blue: #0055ff;
            --bg: #050914;
            --panel: rgba(0, 40, 80, 0.4);
            --danger: #ff003c;
            --success: #00ff66;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg);
            color: #fff;
            margin: 0;
            padding: 0;
            overflow: hidden; /* 스크롤 방지 */
            height: 100vh;
            display: flex;
            flex-direction: column;
            background-image: radial-gradient(circle at 50% 0%, #1a2a40 0%, var(--bg) 70%);
        }

        /* --- [메인 UI] --- */
        #main-ui {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            animation: fadeIn 0.5s;
        }

        h1 {
            font-size: 1.8rem;
            letter-spacing: 5px;
            color: var(--cyan);
            text-shadow: 0 0 15px rgba(0, 243, 255, 0.5);
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .subtitle {
            color: #88aadd;
            font-size: 0.9rem;
            letter-spacing: 2px;
            margin-bottom: 40px;
        }

        /* 홀로그램 패널 */
        .status-panel {
            background: var(--panel);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 243, 255, 0.3);
            border-radius: 20px;
            padding: 40px 20px;
            width: 85%;
            max-width: 350px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 85, 255, 0.2), inset 0 0 20px rgba(0, 243, 255, 0.05);
            margin-bottom: 40px;
        }

        #data-count {
            font-size: 4.5rem;
            font-weight: 900;
            margin: 15px 0;
            color: #fff;
            text-shadow: 0 0 20px var(--cyan);
            font-variant-numeric: tabular-nums;
        }

        /* 과학적인 프로그레스 바 */
        .energy-bar-container {
            width: 80%;
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            margin: 0 auto 20px auto;
            overflow: hidden;
            position: relative;
        }

        #energy-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--blue), var(--cyan));
            box-shadow: 0 0 10px var(--cyan);
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-scan {
            background: transparent;
            color: var(--cyan);
            border: 2px solid var(--cyan);
            padding: 18px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            letter-spacing: 2px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.3);
            transition: all 0.2s;
            text-transform: uppercase;
        }

        .btn-scan:active {
            transform: scale(0.95);
            background: var(--cyan);
            color: #000;
        }

        /* --- [스캐너 UI] --- */
        #scanner-ui {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 100;
        }

        #reader { width: 100%; height: 100vh; }

        .scan-target {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 250px; height: 250px;
            border: 2px solid rgba(0, 243, 255, 0.5);
            box-shadow: 0 0 0 4000px rgba(0,0,10,0.85); /* 뷰파인더 밖 어둡게 */
            z-index: 110;
            pointer-events: none;
        }

        /* 십자선 포인트 */
        .scan-target::before { content: '+'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: var(--cyan); font-size: 20px; opacity: 0.7; }

        /* 스캔 레이저 애니메이션 */
        .laser {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: var(--cyan);
            box-shadow: 0 0 15px var(--cyan);
            animation: scan 2s infinite linear;
        }

        @keyframes scan { 0% { top: 0; } 50% { top: 100%; } 100% { top: 0; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .btn-close {
            position: absolute;
            bottom: 40px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255,255,255,0.3);
            color: white; padding: 12px 30px; border-radius: 30px;
            z-index: 120; backdrop-filter: blur(5px);
        }

        /* --- [결과 모달창 (핵심: 턴제 진행)] --- */
        #result-modal {
            display: none;
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 5, 15, 0.9);
            z-index: 200;
            align-items: center; justify-content: center;
            backdrop-filter: blur(10px);
        }

        .modal-content {
            background: rgba(0, 30, 60, 0.8);
            border: 1px solid var(--cyan);
            padding: 40px 30px;
            border-radius: 20px;
            text-align: center;
            width: 80%;
            max-width: 320px;
            box-shadow: 0 0 40px rgba(0, 243, 255, 0.2);
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        .modal-icon { font-size: 3rem; margin-bottom: 15px; }
        .modal-title { font-size: 1.3rem; font-weight: bold; margin-bottom: 10px; color: var(--cyan); }
        .modal-desc { color: #aaa; font-size: 0.95rem; line-height: 1.5; margin-bottom: 25px; word-break: keep-all; }

        .btn-confirm {
            background: var(--cyan);
            color: #000; font-weight: bold; border: none;
            padding: 15px 0; width: 100%; border-radius: 12px; font-size: 1.1rem;
        }

        /* 초기화 버튼 (눈에 띄지 않게 하단 배치) */
        .reset-text { position: fixed; bottom: 15px; color: #444; font-size: 12px; text-decoration: underline; cursor: pointer; }

        /* 최종 당첨 화면 강제 덮어쓰기 */
        body.cleared { background: #000; animation: disco 2s infinite; }
        @keyframes disco { 0% { box-shadow: inset 0 0 100px rgba(0,255,100,0.2); } 50% { box-shadow: inset 0 0 100px rgba(0,200,255,0.4); } 100% { box-shadow: inset 0 0 100px rgba(0,255,100,0.2); } }
    </style>
</head>
<body>

    <div id="main-ui">
        <h1>NEXUS RADAR</h1>
        <div class="subtitle">에너지 코어 탐지 시스템</div>

        <div class="status-panel">
            <p style="margin: 0; color: #7799cc; font-size: 12px; letter-spacing: 2px;">수집된 에너지 코어</p>
            <div id="data-count">0<span style="font-size: 2rem; color: #5577aa;">/7</span></div>
            
            <div class="energy-bar-container">
                <div id="energy-bar"></div>
            </div>
            
            <p id="system-msg" style="color: #aaa; font-size: 0.9rem; margin-top: 10px;">스캐너를 가동하여 주변의<br>QR 마커를 스캔하십시오.</p>
        </div>

        <button class="btn-scan" id="start-btn" onclick="startScanner()">SCAN START</button>
        <div class="reset-text" onclick="resetGame()">시스템 초기화</div>
    </div>

    <div id="scanner-ui">
        <div id="reader"></div>
        <div class="scan-target"><div class="laser"></div></div>
        <button class="btn-close" onclick="stopScanner()">스캔 취소</button>
    </div>

    <div id="result-modal">
        <div class="modal-content">
            <div id="modal-icon" class="modal-icon">🔍</div>
            <div id="modal-title" class="modal-title">데이터 분석 중</div>
            <div id="modal-desc" class="modal-desc">결과를 확인합니다.</div>
            <button class="btn-confirm" onclick="closeModal()">확인</button>
        </div>
    </div>

    <script>
        // --- 설정 ---
        const TOTAL_BOXES = 7;
        const GUARANTEE_COUNT = 5; // 5개부터 100% 당첨
        const LOW_PROBABILITY = 0.05; // 초반 5% 확률

        let html5QrScanner = null;
        let isProcessing = false;

        // 초기화 (페이지 로드)
        window.onload = () => { updateUI(); };

        // 스마트폰 햅틱(진동) 피드백 함수
        function hapticFeedback(type) {
            if (!navigator.vibrate) return;
            switch(type) {
                case 'error': navigator.vibrate([100, 50, 100]); break; // 짧게 두번
                case 'warn': navigator.vibrate(200); break; // 묵직하게 한번
                case 'success': navigator.vibrate([100, 50, 200]); break; // 띠-딩!
                case 'jackpot': navigator.vibrate([300, 100, 300, 100, 500, 200, 1000]); break; // 진동 폭발
            }
        }

        // 스캐너 가동
        function startScanner() {
            document.getElementById('main-ui').style.display = 'none';
            document.getElementById('scanner-ui').style.display = 'block';

            html5QrScanner = new Html5Qrcode("reader");
            
            const config = { 
                fps: 20, 
                qrbox: { width: 250, height: 250 },
                aspectRatio: window.innerHeight / window.innerWidth // 풀스크린 꽉 차게
            };

            html5QrScanner.start({ facingMode: "environment" }, config, onScanSuccess)
            .catch(err => {
                alert("카메라 접근 권한이 필요합니다.");
                stopScanner();
            });
        }

        // 스캐너 중지
        function stopScanner() {
            if (html5QrScanner) {
                html5QrScanner.stop().then(() => {
                    html5QrScanner.clear();
                    html5QrScanner = null;
                }).catch(e => console.log(e));
            }
            document.getElementById('scanner-ui').style.display = 'none';
            document.getElementById('main-ui').style.display = 'flex';
            isProcessing = false;
        }

        // 🌟 [핵심] 스캔 성공 이벤트
        function onScanSuccess(decodedText) {
            if (isProcessing) return; 
            isProcessing = true; // 무한 반복 방지 락(Lock)

            // 즉시 카메라 끄기 (화면을 일시정지하는 효과 + 배터리 절약)
            if (html5QrScanner) {
                html5QrScanner.stop().then(() => { html5QrScanner.clear(); html5QrScanner = null; });
            }
            document.getElementById('scanner-ui').style.display = 'none';
            
            // 데이터 처리 로직 호출
            processScanData(decodedText);
        }

        // 데이터 처리 및 모달 호출
        function processScanData(code) {
            let foundBoxes = JSON.parse(localStorage.getItem('found_boxes') || '[]');
            let title = "", desc = "", icon = "", vibe = "";

            // 1. 유효성 검사
            if (!code.startsWith('BOX_')) {
                vibe = 'error'; icon = "❌"; title = "오류: 미확인 객체"; desc = "등록되지 않은 QR 마커입니다.";
                showModal(icon, title, desc, vibe);
                return;
            }

            // 2. 중복 검사
            if (foundBoxes.includes(code)) {
                vibe = 'warn'; icon = "⚠️"; title = "중복 스캔"; desc = "이미 코어를 추출한 구역입니다.<br>다른 구역을 수색하십시오.";
                showModal(icon, title, desc, vibe);
                return;
            }

            // 3. 정상 스캔 처리
            foundBoxes.push(code);
            localStorage.setItem('found_boxes', JSON.stringify(foundBoxes));
            const count = foundBoxes.length;

            const boxNum = code.replace('BOX_', '');
            const isWin = (count >= GUARANTEE_COUNT) || (Math.random() < LOW_PROBABILITY);

            if (isWin) {
                // 당첨
                localStorage.setItem('game_cleared', 'true');
                vibe = 'jackpot'; icon = "💎"; 
                title = "오메가 코어 발견!"; 
                desc = `구역 [${boxNum}]에서 <b>최종 보물</b>을 찾았습니다!<br>진행 요원에게 화면을 보여주세요.`;
                
                // 파티클 터뜨리기 (사이버펑크 느낌)
                const duration = 3000; const end = Date.now() + duration;
                (function frame() {
                    confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#00f3ff', '#ffffff'] });
                    confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#00f3ff', '#ffffff'] });
                    if (Date.now() < end) requestAnimationFrame(frame);
                }());

            } else {
                // 꽝 (수집만 됨)
                vibe = 'success'; icon = "🔋"; 
                title = "일반 코어 추출 완료"; 
                desc = `구역 [${boxNum}]의 데이터를 수집했습니다.<br>아직 특별한 반응은 없습니다. (${count}/${TOTAL_BOXES})`;
            }

            showModal(icon, title, desc, vibe);
        }

        // 모달 띄우기
        function showModal(icon, title, desc, vibeType) {
            hapticFeedback(vibeType);
            
            document.getElementById('modal-icon').innerText = icon;
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-title').style.color = (vibeType === 'error' || vibeType === 'warn') ? 'var(--danger)' : 'var(--cyan)';
            document.getElementById('modal-desc').innerHTML = desc;
            
            document.getElementById('result-modal').style.display = 'flex';
        }

        // 모달 닫기 (유저가 직접 '확인'을 눌러야 메인으로 복귀)
        function closeModal() {
            document.getElementById('result-modal').style.display = 'none';
            document.getElementById('main-ui').style.display = 'flex';
            isProcessing = false; // 락 해제
            updateUI(); // 최신 상태 반영
        }

        // 메인 화면 UI 업데이트
        function updateUI() {
            const foundBoxes = JSON.parse(localStorage.getItem('found_boxes') || '[]');
            const count = foundBoxes.length;
            const isCleared = localStorage.getItem('game_cleared') === 'true';

            // 숫자 업데이트
            document.getElementById('data-count').innerHTML = `${count}<span style="font-size: 2rem; color: #5577aa;">/${TOTAL_BOXES}</span>`;
            
            // 게이지 바 애니메이션 업데이트
            const percent = (count / TOTAL_BOXES) * 100;
            document.getElementById('energy-bar').style.width = `${percent}%`;

            // 게임 클리어 시 UI 변경
            if (isCleared) {
                document.body.classList.add('cleared');
                document.getElementById('start-btn').style.display = 'none';
                document.getElementById('system-msg').innerHTML = "<b style='color:#00ff66;'>모든 미션을 완수했습니다!<br>본부로 귀환하십시오.</b>";
                document.getElementById('data-count').style.color = "var(--success)";
                document.getElementById('data-count').style.textShadow = "0 0 20px var(--success)";
                document.getElementById('energy-bar').style.background = "var(--success)";
                document.getElementById('energy-bar').style.boxShadow = "0 0 15px var(--success)";
            }
        }

        // 완전 초기화 (숨겨둔 버튼)
        function resetGame() {
            if(confirm("시스템 메모리를 포맷하시겠습니까? (모든 기록 삭제)")) {
                localStorage.clear();
                location.reload();
            }
        }
    </script>
</body>
</html>
